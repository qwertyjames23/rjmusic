name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
      ADMIN_EMAIL: admin@example.com
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Supabase migration guard
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "pull_request" ]; then
            BASE="$PR_BASE_SHA"
            HEAD="$PR_HEAD_SHA"
          else
            BASE="$BEFORE_SHA"
            HEAD="$HEAD_SHA"
          fi

          if [ -z "${BASE:-}" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            BASE="$(git rev-list --max-parents=0 HEAD)"
          fi

          echo "Checking migration changes in range: $BASE..$HEAD"

          mapfile -t changed < <(git diff --name-status "$BASE" "$HEAD" -- "supabase/migrations/*.sql" || true)
          if [ "${#changed[@]}" -eq 0 ]; then
            echo "No migration changes detected."
            exit 0
          fi

          echo "Changed migrations:"
          printf '%s\n' "${changed[@]}"

          # Guard 1: historical migrations are immutable in CI; only new files should be added.
          bad_status=0
          for line in "${changed[@]}"; do
            status="$(echo "$line" | awk '{print $1}')"
            file="$(echo "$line" | awk '{print $2}')"
            if [ "$status" != "A" ]; then
              echo "::error::$file was modified/deleted. Create a new migration file instead of editing history."
              bad_status=1
            fi
          done
          if [ "$bad_status" -ne 0 ]; then
            exit 1
          fi

          # Guard 2: enforce migration filename format: 14-digit timestamp + underscore + slug.sql
          bad_name=0
          while IFS= read -r file; do
            name="$(basename "$file")"
            if [[ ! "$name" =~ ^[0-9]{14}_[a-z0-9_]+\.sql$ ]]; then
              echo "::error::$name is invalid. Use: YYYYMMDDHHMMSS_description.sql"
              bad_name=1
            fi
          done < <(find supabase/migrations -maxdepth 1 -type f -name '*.sql' | sort)
          if [ "$bad_name" -ne 0 ]; then
            exit 1
          fi

          # Guard 3: migration version prefix must be unique.
          dupes="$(find supabase/migrations -maxdepth 1 -type f -name '*.sql' -printf '%f\n' | cut -d'_' -f1 | sort | uniq -d || true)"
          if [ -n "$dupes" ]; then
            echo "::error::Duplicate migration version(s) detected: $dupes"
            exit 1
          fi

          echo "Supabase migration guard passed."

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (stabilized scope)
        run: npx eslint src/app/admin/orders src/app/admin/reviews src/app/admin/products/page.tsx src/app/admin/inventory src/app/admin/product/new/page.tsx src/app/admin/product/[id]/edit/page.tsx src/app/admin/product/[id]/variants/page.tsx src/app/product/[id]/page.tsx src/components/features/BuyBox.tsx src/app/order-confirmation/[id]/page.tsx src/app/_brands/page.tsx src/lib/data.ts src/components/ui/image-upload.tsx src/utils/supabase/middleware.ts --ext .ts,.tsx

      - name: Typecheck
        run: npx tsc --noEmit --pretty false

      - name: Build
        run: npm run build
