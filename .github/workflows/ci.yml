name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
      ADMIN_EMAIL: admin@example.com
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (stabilized scope)
        run: npx eslint src/app/admin/orders src/app/product/[id]/page.tsx src/components/features/BuyBox.tsx --ext .ts,.tsx

      - name: Typecheck
        run: npx tsc --noEmit --pretty false

      - name: Build
        run: npm run build
